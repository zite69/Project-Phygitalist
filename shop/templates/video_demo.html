{% extends 'oscar/layout.html' %}


{% block head %}
{{ block.super }}
<script src='https://8x8.vc/{{ jaas_app_id }}/external_api.js'></script>
{% endblock %}

{% block content %}
<h1>Video Call Buyer/Seller Demo</h1>
<div id="meet">
&nbsp;
</div>
{% endblock %}

{% block extrascripts %}
<script>
    const domain = '8x8.vc';
    const options = {
        roomName: '{{ jaas_app_id }}/Zite69SellerBuyerVideoDemo',
        width: 1024,
        height: 768,
        parentNode: document.querySelector('#meet'),
        allow: 'camera; microphone; fullscreen; display-capture; autoplay',
        jwt: '{{ jwt_token }}',
    };
    const api = new JitsiMeetExternalAPI(domain, options);
</script>
{% endblock %}
